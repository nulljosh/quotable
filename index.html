<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotable</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<script>
  const mq = matchMedia('(prefers-color-scheme: light)');
  document.documentElement.dataset.theme = mq.matches ? 'light' : 'dark';
  mq.addEventListener('change', e => document.documentElement.dataset.theme = e.matches ? 'light' : 'dark');
</script>
</head>
<body>
  <main class="wrap">
    <header>
      <h1><a href="/"><img src="icon.svg" alt="" class="logo">Quotable</a></h1>
      <div class="stats">
        <span id="score">Score: 0</span>
        <span id="streak">Streak: 0</span>
        <button id="settings-btn" aria-label="Settings">⚙️</button>
      </div>
    </header>

    <div id="settings" class="panel hidden">
      <h2>Settings</h2>
      <label class="setting-row">
        <span>Sound effects</span>
        <input type="checkbox" id="sfx-toggle">
      </label>
      <label class="setting-row">
        <span>Volume</span>
        <input type="range" id="sfx-volume" min="0" max="100" value="60">
      </label>
      <button id="settings-close">Close</button>
    </div>

    <div id="mode-select" class="panel">
      <p>Guess the movie from the quote.</p>
      <select id="genre">
        <option value="all">All genres</option>
        <option value="action">Action</option>
        <option value="comedy">Comedy</option>
        <option value="drama">Drama</option>
        <option value="scifi">Sci-Fi</option>
        <option value="classic">Classic</option>
      </select>
      <button id="start-normal">Play</button>
      <button id="start-speed">Speed Round (10s)</button>
    </div>

    <div id="game" class="panel hidden">
      <div class="timer-ring hidden" id="timer-ring">
        <svg viewBox="0 0 36 36">
          <path class="ring-bg" d="M18 2 a16 16 0 0 1 0 32 a16 16 0 0 1 0 -32" />
          <path class="ring-fg" id="ring-fg" d="M18 2 a16 16 0 0 1 0 32 a16 16 0 0 1 0 -32" />
        </svg>
        <span id="timer-num"></span>
      </div>
      <span id="genre-badge" class="genre-badge"></span>
      <blockquote id="quote"></blockquote>
      <div id="options" class="options"></div>
      <p id="feedback"></p>
    </div>

    <div id="end" class="panel hidden">
      <h2>Game Over</h2>
      <p id="final-score"></p>
      <button id="restart">Play Again</button>
      <button id="share">Share Score</button>
    </div>
  </main>
  <script src="game.js"></script>
</body>
</html>
